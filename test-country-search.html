        // Filter function (same as in the React component)
        function filterCountries(countries, query) {
            if (!query || query.trim() === '') return countries;

            const searchTerm = query.toLowerCase().trim();
            return countries.filter((c) => {
                const nameMatch = c.name.toLowerCase().includes(searchTerm);
                const codeMatch = (c.code || '').toLowerCase().includes(searchTerm);
                return nameMatch || codeMatch;
            });
        }

        // Render results
        function renderResults(countries, containerId) {
            const container = document.getElementById(containerId);
            if (countries.length === 0) {
                container.innerHTML = '<div class="no-results">No countries found</div>';
                return;
            }

            container.innerHTML = countries.map(country =>
                `<div class="country-item">${country.name} (${country.code})</div>`
            ).join('');
        }
